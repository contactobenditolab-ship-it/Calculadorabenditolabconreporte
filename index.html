  function parseEuroTextToNumber(text) {
    if (!text) return 0;
    const clean = String(text)
      .replace(/€/g, '')
      .replace(/\./g, '')
      .replace(',', '.')
      .replace(/[^0-9.-]/g, '')
      .trim();
    const n = parseFloat(clean);
    return Number.isFinite(n) ? n : 0;
  }

  function setTramosBlancos(tramos) {
    const rows = [1, 2, 3, 4, 5];
    rows.forEach((n, idx) => {
      const t = tramos[idx] || { min: '', max: '', dto: 0 };
      document.getElementById(`tb${n}_min`).value = Number.isFinite(t.min) ? t.min : '';
      document.getElementById(`tb${n}_max`).value = t.max === Infinity ? 999999 : (Number.isFinite(t.max) ? t.max : '');
      document.getElementById(`tb${n}_dto`).value = ((t.dto || 0) * 100).toFixed(1).replace(/\.0$/, '');
    });
  }

  function getTramosBlancosFromUI() {
    const out = [];
    for (let n = 1; n <= 5; n++) {
      const min = parseInt(document.getElementById(`tb${n}_min`).value, 10);
      const maxRaw = parseInt(document.getElementById(`tb${n}_max`).value, 10);
      const dto = (parseFloat(document.getElementById(`tb${n}_dto`).value) || 0) / 100;
      if (!Number.isFinite(min) || !Number.isFinite(maxRaw)) continue;
      out.push({
        min,
        max: maxRaw >= 999999 ? Infinity : maxRaw,
        dto,
        label: maxRaw >= 999999 ? `${min}+ ud` : `${min}–${maxRaw} ud`
      });
    }
    out.sort((a, b) => a.min - b.min);
    return out;
  }

  function getTramoBlanco(q, tramos) {
    for (const t of tramos) {
      if (q >= t.min && q <= t.max) return t;
    }
    return tramos[tramos.length - 1] || { min: 1, max: Infinity, dto: 0, label: 'Sin tramo' };
  }

  function renderPliegoPreview({ pw, ph, dis_ancho, dis_alto, MC, dh, dv, total_imp }) {
    const svg = document.getElementById('svg_pliego');
    const previewBox = document.getElementById('pliego_preview');
    if (!svg || !previewBox) return;

    if (!pw || !ph || !dh || !dv) {
      previewBox.style.display = 'none';
      svg.innerHTML = '';
      return;
    }

    const scale = 10;
    const W = pw * scale;
    const H = ph * scale;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

    const totalPorPliego = dh * dv;
    const disenosEnEstePliego = Math.min(totalPorPliego, total_imp);

    const areaPliegoCm2 = pw * ph;
    const areaNetaUsadaCm2 = dis_ancho * dis_alto * disenosEnEstePliego;
    const anchoOcupadoCm = dh > 0 ? (dh * dis_ancho + (dh - 1) * MC) : 0;
    const altoOcupadoCm = dv > 0 ? (dv * dis_alto + (dv - 1) * MC) : 0;
    const areaOcupadaRealCm2 = anchoOcupadoCm * altoOcupadoCm;
    const areaLibreCm2 = Math.max(0, areaPliegoCm2 - areaOcupadaRealCm2);
    const aprovechamientoNeto = areaPliegoCm2 > 0 ? (areaNetaUsadaCm2 / areaPliegoCm2) * 100 : 0;
    const aprovechamientoReal = areaPliegoCm2 > 0 ? (areaOcupadaRealCm2 / areaPliegoCm2) * 100 : 0;

    let svgHtml = '';
    svgHtml += `<rect x="0" y="0" width="${W}" height="${H}" rx="8" ry="8" fill="#f8f8f8" stroke="#222" stroke-width="2"/>`;
    svgHtml += `<rect x="${MC * scale}" y="${MC * scale}" width="${W - 2 * MC * scale}" height="${H - 2 * MC * scale}" fill="#ffffff" stroke="#c7c7c7" stroke-width="1.5" stroke-dasharray="6 4"/>`;

    let placed = 0;
    for (let row = 0; row < dv; row++) {
      for (let col = 0; col < dh; col++) {
        if (placed >= disenosEnEstePliego) break;
        const x = (MC + col * (dis_ancho + MC)) * scale;
        const y = (MC + row * (dis_alto + MC)) * scale;
        const w = dis_ancho * scale;
        const h = dis_alto * scale;
        svgHtml += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" ry="4" fill="#cfe8ff" stroke="#2563eb" stroke-width="1.5"/>`;
        placed++;
      }
    }

    svgHtml += `<text x="${W / 2}" y="${H - 10}" text-anchor="middle" font-size="14" fill="#555" font-family="Arial, sans-serif">${dh} columnas × ${dv} filas · ${disenosEnEstePliego} diseños visibles</text>`;
    svg.innerHTML = svgHtml;
    previewBox.style.display = 'block';

    setText('pv_disenos', disenosEnEstePliego + ' ud');
    setText('pv_area_neta', fmtM2(areaNetaUsadaCm2 / 10000));
    setText('pv_area_ocupada', fmtM2(areaOcupadaRealCm2 / 10000));
    setText('pv_area_libre', fmtM2(areaLibreCm2 / 10000));
    setText('pv_aprov_neto', pct(aprovechamientoNeto));
    setText('pv_aprov_real', pct(aprovechamientoReal));
  }

  function buildBudgetPayload() {
    const cliente = document.getElementById('email_cliente').value.trim();

    const notasInternas = document.getElementById('notasInternas')?.value.trim() || '';

    const { body } = buildClientBudgetEmail();
    const tecnica = getCurrentTechniqueText();
    const proveedor = getCurrentProviderText();
    const precioUnidadCliente = parseEuroTextToNumber(document.getElementById('r_pvp_dto_con').textContent);
    const totalPresupuestoCliente = parseEuroTextToNumber(document.getElementById('r_total_iva').textContent);
    const pvpSinIva = parseEuroTextToNumber(document.getElementById('r_pvp_dto_sin').textContent);
    const pvpConIva = parseEuroTextToNumber(document.getElementById('r_pvp_dto_con').textContent);
    const totalPedidoConIva = parseEuroTextToNumber(document.getElementById('r_total_iva').textContent);
    const costeTotalUd = parseEuroTextToNumber(document.getElementById('r_coste_ud').textContent);
    const beneficioTotalPedido = parseEuroTextToNumber(document.getElementById('r_ben_total').textContent);
    const packaging = parseEuroTextToNumber(document.getElementById('b_pack_ud').textContent) * cantidad;
    const otrosCostes = parseEuroTextToNumber(document.getElementById('b_otros_ud').textContent) * cantidad;
    const pliegos = parseFloat((document.getElementById('p_num')?.textContent || '0').replace(/[^0-9.]/g, '')) || 0;
    const areaLibre = parseFloat(
      String(document.getElementById('pv_area_libre')?.textContent || '0')
        .replace('m²', '')
        .replace(/\./g, '')
        .replace(',', '.')
        .replace(/[^0-9.-]/g, '')
    ) || 0;
    const aprovechamiento = parseFloat(
      String(document.getElementById('pv_aprov_real')?.textContent || '0')
        .replace('%', '')
        .replace(/\./g, '')
        .replace(',', '.')
        .replace(/[^0-9.-]/g, '')
    ) || 0;

    const nombre = `${numeroPresupuesto} · ${cliente || 'Sin cliente'} · ${producto || 'Sin producto'} · ${fecha}`;

    let picaje = 0;
    if (tecnica === 'Bordado') {
      picaje = parseEuroTextToNumber(document.getElementById('p_total_proveedor_con_iva')?.textContent || '0');
    }

    return {
      nombre,
      id_presupuesto: numeroPresupuesto,
      numero_presupuesto: numeroPresupuesto,
      fecha_envio: fecha,
      estado: 'Enviado',
      cliente,
      email_destino: emailDestino,
      producto,
      cantidad,
      tecnica,
      proveedor,
      precio_unidad_cliente: precioUnidadCliente,
      pvp_sin_iva: pvpSinIva,
      pvp_con_iva: pvpConIva,
      total_presupuesto_cliente: totalPresupuestoCliente,
      total_pedido_con_iva: totalPedidoConIva,
      coste_total_ud: costeTotalUd,
      beneficio_total_pedido: beneficioTotalPedido,
      packaging,
      picaje,
      otros_costes: otrosCostes,
      pliegos,
      area_libre: areaLibre,
      aprovechamiento,
      condiciones,
      notas_internas: notasInternas,
      texto_enviado: body
    };
  }

  function sendBudgetEmail() {
    const { destino, asunto, body } = buildClientBudgetEmail();
    if (!destino) {
      alert('Escribe el email del cliente primero.');
      return;
    }
    const href = `mailto:${encodeURIComponent(destino)}?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(body)}`;
    window.location.href = href;
  }

  async function saveBudgetToMake() {
    const statusEl = document.getElementById('save_status');

    if (!MAKE_WEBHOOK_URL || MAKE_WEBHOOK_URL === 'PEGA_AQUI_TU_WEBHOOK_DE_MAKE') {
      alert('Primero pega la URL real del webhook de Make en el código.');
      return;
    }

    const payload = buildBudgetPayload();

    try {
      statusEl.textContent = 'Enviando presupuesto a Make...';

      const res = await fetch(MAKE_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      statusEl.textContent = 'Presupuesto enviado correctamente al webhook de Make.';
    } catch (err) {
      console.error(err);
      statusEl.textContent = 'No se pudo enviar el presupuesto a Make. Revisa la URL del webhook y Vercel.';
      alert('No se pudo enviar el presupuesto al webhook de Make.');
    }
  }

  function populateProveedorSelect() {
    const tecnica = document.getElementById('tecnica').value;
    const sp = document.getElementById('proveedor_sel');
    const current = sp.value;
    const proveedores = TECNICAS[tecnica]?.proveedores || [];

    sp.innerHTML = '';

    proveedores.forEach(key => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = PROV_CONFIG[key].nombre;
      sp.appendChild(opt);
    });

    if (proveedores.includes(current)) sp.value = current;
  }

  function calcPersonalizacion({ tecnica_key, proveedor_key, cantidad, dis_ancho, dis_alto, posiciones, vinilo_tipo }) {
    const MC = 0.2;
    const prov = PROV_CONFIG[proveedor_key] || PROV_CONFIG['ninguno'];

    const resultado = {
      pers_ud: 0,
      coste_total_mat: 0,
      coste_total_mat_sin_iva: 0,
      iva_mat_proveedor: 0,
      total_proveedor_personalizacion_con_iva: 0,
      num_pliegos: 0,
      dis_pliego: 0,
      area_pliego_m2: 0,
      area_usada_m2: 0,
      coste_pliego_val: 0,
      show_pliegos: false,
      envio_prov_total: 0,
      prov_dims: '—',
      tramo_label_display: '—',
      detalle: null,
      prov,
      MC,
      dh: 0,
      dv: 0,
      pw: 0,
      ph: 0,
      total_imp: 0
    };

    if (tecnica_key === 'bordado') {
      const puntadas = parseInt(document.getElementById('puntadas').value, 10) || 5000;
      const bord_colores = parseInt(document.getElementById('bord_colores').value, 10) || 1;
      const bord_pos = parseInt(document.getElementById('bord_pos').value, 10) || 1;
      const bord_picaje = parseInt(document.getElementById('bord_picaje').value, 10) || 0;
      const bord_coste_puntada = parseFloat(document.getElementById('bord_coste_puntada').value) || 0.0015;
      const bord_manipulacion = parseFloat(document.getElementById('bord_manipulacion').value) || 1.25;
      const bord_picaje_coste = parseFloat(document.getElementById('bord_picaje_coste').value) || 10;
      const bord_extra_color = parseFloat(document.getElementById('bord_extra_color').value) || 0.15;

      const coste_puntadas_ud = puntadas * bord_coste_puntada * bord_pos;
      const extra_colores_ud = Math.max(0, bord_colores - 1) * bord_extra_color * bord_pos;
      const coste_manipulacion_ud = bord_manipulacion * bord_pos;
      const coste_picaje_ud = bord_picaje ? (bord_picaje_coste / cantidad) : 0;

      resultado.pers_ud = coste_puntadas_ud + extra_colores_ud + coste_manipulacion_ud + coste_picaje_ud;
      resultado.coste_total_mat = resultado.pers_ud * cantidad;
      resultado.show_pliegos = true;

      resultado.detalle = {
        proveedor: 'Producción propia',
        tramo: puntadas.toLocaleString('es-ES') + ' puntadas',
        dims: f2(bord_coste_puntada),
        disPliego: bord_pos + ' posición(es)',
        num: bord_colores + ' color(es)',
        areaPliego: f2(bord_manipulacion),
        areaUsada: f2(extra_colores_ud),
        areaLibre: f2(coste_picaje_ud),
        costePliego: f2(coste_puntadas_ud),
        costeTotalMat: f2(resultado.pers_ud),
        envio: bord_picaje ? f2(bord_picaje_coste) : 'No aplica'
      };
    } else if (tecnica_key === 'laser') {
      const laser_maq = parseFloat(document.getElementById('laser_maq').value) || 0;
      const laser_man = parseFloat(document.getElementById('laser_man').value) || 0;
      const laser_extra_ud = parseFloat(document.getElementById('laser_extra_ud').value) || 0;
      const laser_coste_hora = parseFloat(document.getElementById('laser_coste_hora').value) || 0.63;
      const laser_coste_mo = parseFloat(document.getElementById('laser_coste_mo').value) || 15;

      const coste_maquina_ud = (laser_maq / 60) * laser_coste_hora;
      const coste_mano_obra_ud = (laser_man / 60) * laser_coste_mo;

      resultado.pers_ud = coste_maquina_ud + coste_mano_obra_ud + laser_extra_ud;
      resultado.coste_total_mat = resultado.pers_ud * cantidad;
      resultado.show_pliegos = true;

      resultado.detalle = {
        proveedor: document.getElementById('laser_tipo').selectedOptions[0].textContent,
        tramo: f2(laser_coste_hora),
        dims: f2(laser_coste_mo),
        disPliego: laser_maq.toFixed(1).replace('.', ',') + ' min',
        num: laser_man.toFixed(1).replace('.', ',') + ' min',
        areaPliego: f2(coste_maquina_ud),
        areaUsada: f2(coste_mano_obra_ud),
        areaLibre: laser_extra_ud > 0 ? f2(laser_extra_ud) : '—',
        costePliego: f2(resultado.pers_ud),
        costeTotalMat: f2(resultado.coste_total_mat),
        envio: 'Producción propia'
      };
    } else if (tecnica_key !== 'ninguna') {
      const m2_rate = tecnica_key === 'vinilo' ? (VINILO_M2[vinilo_tipo] || 15) : 0;
      const pw = prov.ancho_cm;
      const ph = prov.alto_cm;

      resultado.pw = pw;
      resultado.ph = ph;

      if (pw > 0 && ph > 0) {
        const dh = Math.floor((pw - 2 * MC + MC) / (dis_ancho + MC));
        const dv = Math.floor((ph - 2 * MC + MC) / (dis_alto + MC));

        resultado.dh = dh;
        resultado.dv = dv;
        resultado.dis_pliego = Math.max(1, dh * dv);
        resultado.total_imp = cantidad * posiciones;
        resultado.num_pliegos = Math.ceil(resultado.total_imp / resultado.dis_pliego);
        resultado.area_pliego_m2 = (pw * ph) / 10000;

        const area_dis_m2 = (dis_ancho * dis_alto) / 10000;
        resultado.area_usada_m2 = Math.min(
          area_dis_m2 * resultado.total_imp,
          resultado.area_pliego_m2 * resultado.num_pliegos
        );

        resultado.prov_dims = pw + ' × ' + ph + ' cm';

        if (proveedor_key === '321dtf' && tecnica_key === 'dtf_textil') {
          const t = get321Precio(resultado.num_pliegos);
          resultado.coste_pliego_val = t.precio;
          resultado.tramo_label_display = t.label;
        } else if (tecnica_key === 'vinilo') {
          resultado.coste_pliego_val = m2_rate * resultado.area_pliego_m2;
          resultado.tramo_label_display = 'Tarifa fija';
        } else {
          resultado.coste_pliego_val = prov.coste_pliego;
          resultado.tramo_label_display = 'Tarifa estándar';
        }

        resultado.coste_total_mat_sin_iva = resultado.coste_pliego_val * resultado.num_pliegos;
        resultado.coste_total_mat = resultado.coste_total_mat_sin_iva * IVA_COMPRA;
        resultado.iva_mat_proveedor = resultado.coste_total_mat - resultado.coste_total_mat_sin_iva;
        resultado.pers_ud = resultado.coste_total_mat / cantidad;

        let envio_prov_sin_iva = 0;
        if (prov.envio_gratis_desde === null) {
          envio_prov_sin_iva = prov.envio;
        } else if (resultado.coste_total_mat_sin_iva >= prov.envio_gratis_desde) {
          envio_prov_sin_iva = 0;
        } else {
          envio_prov_sin_iva = prov.envio_gratis_desde === 0 ? 0 : prov.envio;
        }

        resultado.envio_prov_total = envio_prov_sin_iva * IVA_COMPRA;
        resultado.total_proveedor_personalizacion_con_iva = resultado.coste_total_mat + resultado.envio_prov_total;
        resultado.show_pliegos = true;
      }
    }

    return resultado;
  }

  function calcPVP({ cantidad, precio_blanco, pack_ud, otros_fijos, margen_min, pers_ud, envio_prov_total }) {
    const divisor = 1 - margen_min;

    const tramosBlancos = getTramosBlancosFromUI();
    const tramoBlanco = getTramoBlanco(cantidad, tramosBlancos);
    const usarDtoBlancoAuto = document.getElementById('usar_dto_blanco_auto').checked;
    const usarDtoBlancoManual = document.getElementById('usar_dto_blanco_manual').checked;
    const dtoBlancoManual = Math.max(0, (parseFloat(document.getElementById('dto_blanco_manual').value) || 0) / 100);

    const dtoBlancoAplicado = Math.min(
      1,
      usarDtoBlancoManual ? dtoBlancoManual : (usarDtoBlancoAuto ? (tramoBlanco.dto || 0) : 0)
    );

    const precio_blanco_final_sin_iva = precio_blanco * (1 - dtoBlancoAplicado);
    const precio_blanco_con_iva = precio_blanco_final_sin_iva * IVA_COMPRA;
    const subtotal_blancos_sin_iva = precio_blanco_final_sin_iva * cantidad;
    const ahorro_blancos_sin_iva = (precio_blanco - precio_blanco_final_sin_iva) * cantidad;
    const envio_blanco_sin_iva = subtotal_blancos_sin_iva >= 100 ? 0 : 5.95;
    const envio_blanco_total = envio_blanco_sin_iva * IVA_COMPRA;
    const subtotal_blancos = precio_blanco_con_iva * cantidad;
    const total_blancos = subtotal_blancos + envio_blanco_total;
    const envio_blanco_ud = envio_blanco_total / cantidad;
    const envio_prov_ud = envio_prov_total / cantidad;

    const costes_fijos_ud =
      pers_ud +
      pack_ud +
      (otros_fijos / cantidad) +
      envio_blanco_ud +
      envio_prov_ud;

    const coste_total_ud = precio_blanco_con_iva + costes_fijos_ud;

    const ti = getTramoVenta(cantidad);
    const dto_nominal = TRAMOS_VENTA[ti].dto;
    const pvp_minimo = coste_total_ud / divisor;
    const blanco_dto_nom = precio_blanco_con_iva * (1 - dto_nominal);
    const pvp_dto_nom = blanco_dto_nom + costes_fijos_ud;

    let blanco_final, pvp_final, capped;

    if (pvp_dto_nom >= pvp_minimo) {
      blanco_final = blanco_dto_nom;
      pvp_final = pvp_dto_nom;
      capped = false;
    } else {
      blanco_final = Math.max(pvp_minimo - costes_fijos_ud, 0);
      pvp_final = blanco_final + costes_fijos_ud;
      capped = true;
    }

    const dto_importe = precio_blanco_con_iva - blanco_final;
    const dto_real_pct = precio_blanco_con_iva > 0 ? (dto_importe / precio_blanco_con_iva) * 100 : 0;
    const pvp_final_iva = pvp_final * (1 + IVA_VENTA);
    const total_pedido_iva = pvp_final_iva * cantidad;
    const margen_real = pvp_final > 0 ? ((pvp_final - coste_total_ud) / pvp_final) * 100 : 0;
    const ben_ud = pvp_final - coste_total_ud;
    const ben_total = ben_ud * cantidad;

    return {
      tramoBlanco,
      dtoBlancoAplicado,
      precio_blanco_final_sin_iva,
      precio_blanco_con_iva,
      subtotal_blancos_sin_iva,
      ahorro_blancos_sin_iva,
      envio_blanco_total,
      subtotal_blancos,
      total_blancos,
      envio_blanco_ud,
      envio_prov_ud,
      costes_fijos_ud,
      coste_total_ud,
      ti,
      dto_nominal,
      blanco_final,
      pvp_final,
      capped,
      dto_importe,
      dto_real_pct,
      pvp_final_iva,
      total_pedido_iva,
      margen_real,
      ben_ud,
      ben_total
    };
  }

    const tecnica = document.getElementById('tecnica').selectedOptions[0]?.textContent || '—';
    const notasInternas = document.getElementById('notasInternas')?.value.trim() || '';
    const fecha = new Date().toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const linea = '─'.repeat(42);

    const lines = [
      'PRESUPUESTO INTERNO · BENDITO LAB',
      `Fecha: ${fecha}`,
      `Nº presupuesto: ${numeroPresupuesto}`,
      linea,
      `Cliente:   ${cliente}`,
      `Email cliente: ${emailDestino}`,
      `Artículo:  ${producto}`,
      `Técnica:   ${tecnica}`,
      `Cantidad:  ${cantidad} ud`,
      linea,
      'COSTES',
      `  Artículo base tarifa sin IVA/ud:   ${f2(precio_blanco)}`,
      `  Dto blancos aplicado:              ${(dtoBlancoAplicado * 100).toFixed(1).replace('.', ',')} %`,
      `  Artículo base final sin IVA/ud:    ${f2(precio_blanco_final_sin_iva)}`,
      `  Artículo base con IVA/ud:          ${f2(precio_blanco_con_iva)}`,
      `  Subtotal blancos sin IVA:          ${f2(subtotal_blancos_sin_iva)}`,
      `  Envío blancos con IVA:             ${envio_blanco_total > 0 ? f2(envio_blanco_total) : 'Gratis'}`,
      `  Total blancos con IVA:             ${f2(total_blancos)}`,
      '',
      `  Personalización/ud:                ${tecnica_key === 'ninguna' ? '—' : f2(pers_ud)}`,
      `  Packaging/ud:                      ${pack_ud > 0 ? f2(pack_ud) : '—'}`,
      `  Otros costes/ud:                   ${otros_fijos > 0 ? f2(otros_fijos / cantidad) : '—'}`,
      `  Envío blancos/ud:                  ${envio_blanco_total > 0 ? f2(envio_blanco_ud) : 'Gratis'}`,
      `  Envío proveedor/ud:                ${show_pliegos && envio_prov_total > 0 ? f2(envio_prov_ud) : '—'}`,
      `  Costes fijos totales/ud:           ${f2(costes_fijos_ud)}`,
      `  COSTE TOTAL/ud:                    ${f2(coste_total_ud)}`,
      linea,
      'PRECIOS Y MARGEN',
      `  Margen mínimo configurado:         ${(margen_min * 100).toFixed(0)} %`,
      `  Tramo venta:                       ${TRAMOS_VENTA[ti].label} · ${(dto_nominal * 100).toFixed(0)}% dto${capped ? ' (limitado a ' + dto_real_pct.toFixed(0) + '%)' : ''}`,
      `  PVP final sin IVA/ud:              ${f2(pvp_final)}`,
      `  PVP final con IVA/ud:              ${f2(pvp_final_iva)}`,
      `  Margen real sobre venta:           ${pct(margen_real)}`,
      `  Beneficio/ud:                      ${f2(ben_ud)}`,
      `  Beneficio total pedido:            ${f2(ben_total)}`,
      `  TOTAL PEDIDO CON IVA:              ${f2(total_pedido_iva)}`
    ];

    if (show_pliegos && tecnica_key !== 'bordado' && tecnica_key !== 'laser') {
      lines.push(linea, 'DETALLE PLIEGOS / PERSONALIZACIÓN');
      lines.push(`  Proveedor:                         ${prov.nombre}`);
      lines.push(`  Tramo precio:                      ${tramo_label_display} (${f2(coste_pliego_val)}/pliego)`);
      lines.push(`  Dimensiones pliego:                ${prov_dims}`);
      lines.push(`  Diseños por pliego:                ${dis_pliego}`);
      lines.push(`  Pliegos necesarios:                ${num_pliegos}`);
      lines.push(`  Área pliego:                       ${(area_pliego_m2 * 10000).toFixed(0)} cm²`);
      lines.push(`  Área usada:                        ${(area_usada_m2 * 10000).toFixed(0)} cm²`);
      lines.push(`  Coste material sin IVA:            ${f2(coste_total_mat_sin_iva)}`);
      lines.push(`  IVA proveedor:                     ${f2(iva_mat_proveedor)}`);
      lines.push(`  Coste material con IVA:            ${f2(coste_total_mat)}`);
      lines.push(`  Envío proveedor con IVA:           ${envio_prov_total > 0 ? f2(envio_prov_total) : 'Gratis'}`);
      lines.push(`  Total proveedor con IVA:           ${f2(total_proveedor_personalizacion_con_iva)}`);
    }

    if (notasInternas) {
      lines.push(linea, 'NOTAS INTERNAS', notasInternas);
    }

    lines.push(linea, 'Generado por Calculadora Bendito Lab');

    return {
      asunto: `[INTERNO] ${numeroPresupuesto} · ${cliente} · ${producto} · ${fecha}`,
      body: lines.join('\n')
    };
  }

  function sendInternalEmail() {
    const destino = document.getElementById('mi_email').value.trim();
    if (!destino) {
      alert('Escribe tu email primero para poder enviarte la copia interna.');
      return;
    }

    const { asunto, body } = buildInternalEmail();
    const href = `mailto:${encodeURIComponent(destino)}?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(body)}`;
    window.location.href = href;
  }

  function generarNumeroPresupuesto() {
    const campo = document.getElementById('numeroPresupuesto');
    if (!campo) return;

    if (campo.value) return;

    let numero = localStorage.getItem('contadorPresupuestos');

    if (!numero) {
      numero = 1;
    } else {
      numero = parseInt(numero, 10) + 1;
    }

    localStorage.setItem('contadorPresupuestos', numero);
    campo.value = 'PRE-' + String(numero).padStart(4, '0');
  }

  document.getElementById('tecnica').addEventListener('change', updateTecnicaUI);
  document.getElementById('perfil_blanco').addEventListener('change', () => applyPerfilBlanco(true));
  document.getElementById('margen_min').addEventListener('input', calc);
  document.getElementById('laser_tipo').addEventListener('change', () => {
    applyLaserPreset();
    calc();
  });

  const slider = document.getElementById('slider_cant');
  const cantI = document.getElementById('cantidad');

  slider.addEventListener('input', () => {
    cantI.value = slider.value;
    setText('slider_out', slider.value + ' ud');
    calc();
  });

  cantI.addEventListener('input', () => {
    slider.value = cantI.value;
    setText('slider_out', cantI.value + ' ud');
    calc();
  });

  [
    'precio_blanco', 'pack_coste', 'otros_fijos', 'proveedor_sel', 'dis_ancho', 'dis_alto', 'posiciones', 'vinilo_tipo',
    'usar_dto_blanco_auto', 'usar_dto_blanco_manual', 'dto_blanco_manual',
    'tb1_min', 'tb1_max', 'tb1_dto', 'tb2_min', 'tb2_max', 'tb2_dto',
    'tb3_min', 'tb3_max', 'tb3_dto', 'tb4_min', 'tb4_max', 'tb4_dto',
    'tb5_min', 'tb5_max', 'tb5_dto',
    'puntadas', 'bord_colores', 'bord_pos', 'bord_picaje',
    'bord_coste_puntada', 'bord_manipulacion', 'bord_picaje_coste', 'bord_extra_color',
    'laser_maq', 'laser_man', 'laser_extra_ud', 'laser_coste_hora', 'laser_coste_mo'
  ].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', calc);
    el.addEventListener('change', calc);
  });

  const emailBtn = document.getElementById('btn_email_presupuesto');
  if (emailBtn) emailBtn.addEventListener('click', sendBudgetEmail);

  const saveBtn = document.getElementById('btn_guardar_notion');
  if (saveBtn) saveBtn.addEventListener('click', saveBudgetToMake);

  const internoBtn = document.getElementById('btn_email_interno');
  if (internoBtn) internoBtn.addEventListener('click', sendInternalEmail);

  window.addEventListener('load', () => {
    generarNumeroPresupuesto();
    setText('slider_out', cantI.value + ' ud');
    applyPerfilBlanco(false);
    populateProveedorSelect();
    applyLaserPreset();
    updateTecnicaUI();
  });
</script>
